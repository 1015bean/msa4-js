<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./15_dom.css">
  <script src="./15_dom.js" defer></script>  
  <!-- 
      script: js문서를 불러옴
      defer: html에 js에서 조작하고 싶은 요소가 있을 때 html의 코드를 먼저 실행시키고 js를 샐행해야 함.
             script를 <body> 아래쪽에 두는 대신 defer 사용
  -->
  <title>Document</title>
</head>
<body>
  <div class="container"></div>
    <h1 id="title">DOM 제목1</h1>
    <h1 class="title2">DOM 제목2</h1>
    <input type="text" class="set-attr">
</body>
</html>
